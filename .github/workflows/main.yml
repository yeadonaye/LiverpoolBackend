on: push

name: 🚀 Deploy website on push

jobs:

  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5

      with:
              server: ftp-yeadonaye.alwaysdata.net  # Mets ton vrai hôte ici
              username: ${{ secrets.BACKENDLIVERPOOL_AD_USER }}     # Mets ton vrai user ici
              password: ${{ secrets.BACKENDLIVERPOOL_AD_PASSWORD }}            # Mets ton vrai pass ici
              protocol: ftps
              timeout: 60000
