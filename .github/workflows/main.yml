on: push
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Force le protocole FTPS (Port 21 + TLS) pour Alwaysdata
        protocol: ftps
        # Augmente le timeout pour éviter les coupures brutales (ECONNRESET)
        timeout: 60000
        # Supprime les fichiers sur le serveur qui ne sont plus dans le dépôt
        delete-clean: true
        # Optionnel : si le problème persiste, décommente la ligne suivante
        # port: 21
